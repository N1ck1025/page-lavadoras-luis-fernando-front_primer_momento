  <circle cx="62" cy="135" r="2" fill="#00C896" opacity="0.6"/>
  
  <rect x="92" y="125" width="25" height="20" rx="3" fill="none" stroke="#00C896" stroke-width="1.5"/>
  <circle cx="104" cy="135" r="2" fill="#00C896" opacity="0.6"/>
  
  <rect x="134" y="125" width="25" height="20" rx="3" fill="none" stroke="#00C896" stroke-width="1.5"/>
  <circle cx="146" cy="135" r="2" fill="#00C896" opacity="0.6"/>
  
  <!-- Líneas decorativas (efecto seguridad/profesionalismo) -->
